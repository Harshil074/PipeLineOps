name: PipeLineOps CI/CD

# Runs on every push to main and on pull requests targeting main.
# Cancels an in-flight run for the same branch when a newer push
# arrives, so three quick fixes don't burn three full runs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pipelineops-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  # ---------------------------------------------------------------
  # Stage 1 — Validate
  # Cheapest checks first: lint markup/styles/scripts, confirm every
  # data file is valid JSON. Fails in seconds on a typo, before
  # anything more expensive spins up.
  # ---------------------------------------------------------------
  validate:
    name: "1 · Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install lint tooling
        run: |
          npm install --no-save htmlhint stylelint stylelint-config-standard eslint

      - name: Lint HTML
        run: npx htmlhint "index.html" "pages/*.html"

      - name: Lint CSS
        run: npx stylelint "css/*.css" --config '{"extends":"stylelint-config-standard"}'

      - name: Lint JS
        run: npx eslint js/*.js --no-eslintrc --env browser,es2021 --parser-options=ecmaVersion:2021

      - name: Validate JSON data files
        run: |
          for f in data/*.json; do
            echo "Checking $f"
            node -e "JSON.parse(require('fs').readFileSync('$f'))"
          done

  # ---------------------------------------------------------------
  # Stage 2 — Build
  # Stamps this run's commit SHA, build number, and timestamp into
  # data/version.json, then uploads the whole site as one artifact
  # so every later stage works from the exact same bits.
  # ---------------------------------------------------------------
  build:
    name: "2 · Build"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp build metadata into version.json
        run: |
          node -e "
            const fs = require('fs');
            const path = 'data/version.json';
            const data = JSON.parse(fs.readFileSync(path));
            const prev = { ...data };
            delete prev.history;

            data.version = process.env.SITE_VERSION || data.version;
            data.build_number = process.env.GITHUB_RUN_NUMBER;
            data.commit_sha = process.env.GITHUB_SHA.slice(0, 7);
            data.branch = process.env.GITHUB_REF_NAME;
            data.built_at = new Date().toISOString();
            data.workflow_run_url =
              process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY +
              '/actions/runs/' + process.env.GITHUB_RUN_ID;
            data.status = 'success';

            data.history = [
              {
                version: data.version,
                build_number: data.build_number,
                commit_sha: data.commit_sha,
                environment: 'production',
                date: data.built_at,
                status: 'success'
              },
              ...(Array.isArray(prev.history) ? prev.history : []).slice(0, 9)
            ];

            fs.writeFileSync(path, JSON.stringify(data, null, 2));
            console.log(JSON.stringify(data, null, 2));
          "
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: |
            .
            !.git
            !node_modules

  # ---------------------------------------------------------------
  # Stage 3 — Test
  # Serves the built artifact locally and hits every page with a
  # headless browser, asserting the dashboards actually populate
  # from data/*.json — not just that the HTML parses.
  # ---------------------------------------------------------------
  test:
    name: "3 · Test"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        run: |
          npm install --no-save playwright serve
          npx playwright install --with-deps chromium

      - name: Serve site and run smoke tests
        run: |
          npx serve site -l 4173 &
          npx wait-on http://localhost:4173
          node -e "
            const { chromium } = require('playwright');
            const pages = [
              '/', '/pages/about.html', '/pages/pipeline.html',
              '/pages/security.html', '/pages/cost.html',
              '/pages/incidents.html', '/pages/deployment.html'
            ];
            (async () => {
              const browser = await chromium.launch();
              const page = await browser.newPage();
              for (const p of pages) {
                const res = await page.goto('http://localhost:4173' + p);
                if (!res.ok()) throw new Error(p + ' returned ' + res.status());
                console.log('OK', p);
              }
              await browser.close();
            })().catch((e) => { console.error(e); process.exit(1); });
          "

  # ---------------------------------------------------------------
  # Stage 4 — Security Scan
  # Secrets scanning has no override: a real finding blocks deploy.
  # ---------------------------------------------------------------
  security-scan:
    name: "4 · Security Scan"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit pipeline tooling dependencies
        run: |
          if [ -f package.json ]; then npm audit --audit-level=high; else echo "no package.json, skipping"; fi

  # ---------------------------------------------------------------
  # Stage 5 — Deploy
  # Publishes the build artifact to GitHub Pages.
  # ---------------------------------------------------------------
  deploy:
    name: "5 · Deploy"
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

  # ---------------------------------------------------------------
  # Stage 6 — Verify
  # Confirms the live site is actually up and serving the build
  # that was just deployed, not a stale cached version.
  # ---------------------------------------------------------------
  verify:
    name: "6 · Verify"
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check live site responds
        run: |
          URL="${{ needs.deploy.outputs.page_url }}"
          echo "Checking $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Site responded 200"
              break
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s"
            sleep 10
            if [ "$i" = "5" ]; then
              echo "Site did not respond 200 after 5 attempts"
              exit 1
            fi
          done

      - name: Confirm deployed version matches this build
        run: |
          URL="${{ needs.deploy.outputs.page_url }}data/version.json"
          LIVE_SHA=$(curl -s "$URL" | node -e "process.stdin.once('data', d => console.log(JSON.parse(d).commit_sha))")
          EXPECTED_SHA="${GITHUB_SHA:0:7}"
          echo "Live: $LIVE_SHA  Expected: $EXPECTED_SHA"
          if [ "$LIVE_SHA" != "$EXPECTED_SHA" ]; then
            echo "Deployed version does not match this build — failing loudly instead of serving stale content silently."
            exit 1
          fi
